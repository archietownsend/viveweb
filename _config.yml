# Jekyll configuration for the Vive marketing site (GitHub Pages).
# Served at https://getvive.io (custom domain; Pages source: main / root).

title: "Vive"
tagline: "live longer · live better"
description: >-
  Vive turns a photo of your food into an honest verdict, and your Apple Watch
  data into a daily longevity score. Scan meals, understand your sleep, build your
  aerobic base, all on your device.
url: "https://getvive.io"
baseurl: ""   # custom apex domain serves from the root

# Contact + legal details used across the policy pages.
company:
  legal_entity: "Archie Townsend"
  jurisdiction: "the United Kingdom"
policy_updated: "19/06/2026"

# App Store link, fill in once live.
app_store_url: "#"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-seo-tag

# Use kramdown + rouge (GitHub Pages defaults).
markdown: kramdown
